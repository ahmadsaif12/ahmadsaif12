name: Metrics
on:
  # Runs automatically every day
  schedule:
    - cron: "0 0 * * *"
  # Allows manual run from the Actions tab
  workflow_dispatch:
  # Runs on every push to this repo
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # No need to create a personal token — GitHub Actions provides
          # this automatically for every workflow run
          token: ${{ secrets.GITHUB_TOKEN }}

          # Where the generated image will be saved in this repo
          filename: metrics.svg

          # --- Base look ---
          template: classic
          base: header, activity, community, repositories, metadata

          # --- Isometric contribution calendar (the "better than snake" part) ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # --- Most used languages ---
          plugin_languages: yes
          plugin_languages_analysis_timezone: Asia/Kathmandu
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 8

          # --- Extra stats ---
          plugin_lines: yes
          plugin_stars: yes
          plugin_followup: yes
